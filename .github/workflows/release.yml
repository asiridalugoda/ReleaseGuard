name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write  # required for keyless signing

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          OUTPUT="releaseguard-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"
          go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "./dist/${OUTPUT}" \
            ./cmd/releaseguard

      - name: ReleaseGuard self-check
        run: |
          # Bootstrap using the just-built binary for the current platform
          BINARY=$(ls ./dist/releaseguard-linux-* 2>/dev/null | head -1)
          if [ -n "$BINARY" ]; then
            chmod +x "$BINARY"
            "$BINARY" check ./dist --format sarif --out releaseguard.sarif
          fi

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && matrix.goos == 'linux' && matrix.goarch == 'amd64'
        with:
          sarif_file: releaseguard.sarif
        continue-on-error: true

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
