# ReleaseGuard self-scan policy — dogfooding our own tool
# https://github.com/Helixar-AI/ReleaseGuard
version: 2

project:
  name: releaseguard
  mode: release

inputs:
  - path: ./dist
    type: directory

sbom:
  enabled: true
  ecosystems: [go]
  formats: [cyclonedx]
  enrich_cve: false

scanning:
  secrets:
    enabled: true
  metadata:
    enabled: true
    fail_on_source_maps: true
    fail_on_internal_urls: false
    fail_on_build_paths: false
  unexpected_files:
    enabled: true
    deny:
      - ".env"
      - "*.bak"
      - "*.tmp"
  licenses:
    enabled: true
    require:
      - LICENSE

transforms:
  remove_source_maps: true
  delete_forbidden_files: true
  add_checksums: true
  add_manifest: true

obfuscation:
  enabled: false

drm:
  enabled: false

signing:
  enabled: false
  mode: keyless
  subject: "releaseguard-ci"

policy:
  fail_on:
    - severity: critical
    - category: secret
  warn_on:
    - severity: high

output:
  reports:
    - cli
    - sarif
  directory: ./.releaseguard
